<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Swamp Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nunito:wght@400;700&display=swap');

:root {
  --bg:      #021208;
  --water:    #04230f;
  --pad:      #2d6a35;
  --pad2:     #3d8a45;
  --accent:   #7fffb0;
  --glow:     #00ff88;
  --danger:   #ff4444;
  --gold:     #ffd700;
}

* { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }

body {
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
}

#app {
  position: relative;
  width: min(420px, 100vw);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#hud {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 18px;
  background: linear-gradient(180deg, rgba(0,255,120,.10) 0%, transparent 100%);
  border-bottom: 1px solid rgba(0,255,120,.15);
}
#hud .label { font-family:'Cinzel',serif; font-size:13px; color:var(--accent); letter-spacing:.08em; text-shadow:0 0 8px var(--glow); }
#hud .score-val { font-size:22px; font-weight:700; color:var(--gold); text-shadow:0 0 10px #ffd70088; transition:transform .15s; }
#hud .hint { font-size:11px; color:rgba(255,255,255,.35); }
.record-row { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
.record-label { font-size:10px; color:rgba(255,215,0,.5); font-family:'Cinzel',serif; letter-spacing:.05em; }
.record-val { font-size:15px; font-weight:700; color:var(--gold); opacity:.7; }

#viewport {
  flex:1; position:relative; overflow:hidden;
  background:radial-gradient(ellipse 80% 60% at 50% 100%, #073d1a 0%, var(--bg) 100%);
}
#viewport::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 38px,rgba(0,255,100,.025) 39px,transparent 40px);
  pointer-events:none; z-index:0;
}

#world { position:absolute; top:0; left:0; width:100%; will-change:transform; }

.height-marker { position:absolute; right:8px; font-size:10px; color:rgba(0,255,120,.18); font-family:'Cinzel',serif; pointer-events:none; z-index:1; }

#player { position:absolute; width:48px; height:48px; z-index:10; pointer-events:none; will-change:left,top; filter:drop-shadow(0 0 8px #00ff8899) drop-shadow(0 0 16px #00ff8844); }
#playerImg { width:48px; height:48px; object-fit:contain; display:block; }
#playerFallback { width:48px; height:48px; display:none; align-items:center; justify-content:center; font-size:36px; line-height:1; }

.platform {
  position:absolute;
  border-radius:50% 50% 50% 50% / 40% 40% 60% 60%;
  background:radial-gradient(ellipse at 50% 30%, var(--pad2), var(--pad) 70%, #1a3d20);
  box-shadow:0 4px 10px #0008, inset 0 2px 4px rgba(255,255,255,.08);
}
.platform::before { content:''; position:absolute; top:20%; left:10%; width:80%; height:30%; border-radius:50%; background:rgba(255,255,255,.06); }
.platform.moving { background:radial-gradient(ellipse at 50% 30%, #4a9a52, #2d6a35 70%, #1a3d20); box-shadow:0 4px 14px #00ff8833, 0 2px 6px #0008; }

.flower { position:absolute; font-size:20px; line-height:1; text-shadow:0 0 6px #fff8; animation:floatFlower 3s ease-in-out infinite; }
@keyframes floatFlower { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-4px) rotate(4deg)} }

.bubble { position:absolute; border-radius:50%; background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.35), rgba(0,200,100,.1)); border:1px solid rgba(255,255,255,.2); animation:rise linear infinite; pointer-events:none; }
@keyframes rise { 0%{transform:translateY(0) scale(1);opacity:.6;} 100%{transform:translateY(-120px) scale(.4);opacity:0;} }

.overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:rgba(0,8,3,.85); backdrop-filter:blur(5px); z-index:20; }
.overlay h1 { font-family:'Cinzel',serif; font-size:30px; color:var(--accent); text-shadow:0 0 20px var(--glow), 0 0 40px var(--glow); text-align:center; }
.overlay p { color:rgba(255,255,255,.55); font-size:13px; text-align:center; line-height:1.6; }
.overlay .big-score { font-size:52px; color:var(--gold); font-weight:700; text-shadow:0 0 16px #ffd70088; font-family:'Cinzel',serif; }
.overlay .sub { font-size:12px; color:rgba(255,215,0,.5); margin-top:-10px; }

.top-list { width:80%; border-collapse:collapse; }
.top-list td { padding:5px 10px; font-size:13px; border-bottom:1px solid rgba(0,255,100,.1); }
.top-list td:first-child { color:rgba(255,215,0,.6); font-family:'Cinzel',serif; font-size:11px; }
.top-list td:last-child  { text-align:right; color:var(--gold); font-weight:700; }

.btn { padding:12px 36px; border-radius:30px; border:1.5px solid var(--glow); background:transparent; color:var(--accent); font-family:'Cinzel',serif; font-size:15px; letter-spacing:.1em; cursor:pointer; box-shadow:0 0 16px #00ff8844, inset 0 0 12px #00ff8818; transition:background .2s, box-shadow .2s, transform .1s; }
.btn:hover  { background:#00ff8818; box-shadow:0 0 24px #00ff8888; }
.btn:active { transform:scale(.97); }
.btn.danger { border-color:var(--danger); color:var(--danger); }

#controls { display:grid; grid-template-columns:1fr 1fr; background:rgba(0,20,8,.9); border-top:1px solid rgba(0,255,100,.12); padding:2px 0 env(safe-area-inset-bottom,2px); }
#controls button { padding:20px 0; background:transparent; border:none; border-right:1px solid rgba(255,255,255,.06); color:rgba(255,255,255,.7); font-size:26px; cursor:pointer; transition:background .15s; user-select:none; -webkit-tap-highlight-color:transparent; }
#controls button:last-child { border-right:none; }
#controls button:active { background:rgba(0,255,100,.15); }

.liana { position:absolute; top:0; pointer-events:none; z-index:2; opacity:.9; transform-origin:top center; }
.fog { position:absolute; left:-20%; width:140%; height:60px; border-radius:50%; background:radial-gradient(ellipse at 50% 50%, rgba(100,200,120,.07), transparent 70%); pointer-events:none; z-index:0; animation:fogDrift 12s ease-in-out infinite; }
@keyframes fogDrift { 0%,100%{transform:translateX(0);opacity:.6;} 50%{transform:translateX(30px);opacity:1;} }
@keyframes sway { 0%,100%{transform:rotate(-8deg);} 50%{transform:rotate(8deg);} }
@keyframes deathFlash { 0%,100%{filter:none} 50%{filter:brightness(3) saturate(0)} }
.flash { animation:deathFlash .3s ease; }

.new-record { font-family:'Cinzel',serif; font-size:14px; color:#fff; background:linear-gradient(90deg,#ffd700,#ff8c00); padding:5px 18px; border-radius:20px; animation:pulse 1s ease-in-out infinite; display:none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
</style>
</head>
<body>
<div id="app">

  <div id="hud">
    <div>
      <div class="label">🌿 SWAMP</div>
      <div class="hint">Рух = автострибок!</div>
    </div>
    <div style="text-align:center">
      <div class="label">Очки</div>
      <div class="score-val" id="scoreVal">0</div>
    </div>
    <div class="record-row">
      <div class="record-label">🏆 РЕКОРД</div>
      <div class="record-val" id="recordVal">0</div>
    </div>
  </div>

  <div id="viewport">
    <div id="world">
      <div id="player">
        <img id="playerImg" src="1.png" alt="" onerror="this.style.display='none';document.getElementById('playerFallback').style.display='flex'">
        <span id="playerFallback" style="display:none;font-size:36px;line-height:1;">🐸</span>
      </div>
    </div>
  </div>

  <div id="controls">
    <button ontouchstart="startMove(-1)" ontouchend="stopMove()" onmousedown="startMove(-1)" onmouseup="stopMove()">⬅</button>
    <button ontouchstart="startMove(1)"  ontouchend="stopMove()" onmousedown="startMove(1)"  onmouseup="stopMove()">➡</button>
  </div>

  <div class="overlay" id="startScreen">
    <h1>🌿 SWAMP<br>СТРИБКИ</h1>
    <p>Стрибай по листях, збирай квіти<br>Не впади у болото!</p>
    <button class="btn" onclick="startGame()">ПОЧАТИ ГРУ</button>
  </div>

  <div class="overlay" id="gameOverScreen" style="display:none">
    <h1 style="color:var(--danger);text-shadow:0 0 20px #ff4444aa">💀 ПОТОНУВ</h1>
    <div class="big-score" id="goScore">0</div>
    <div class="sub">квіток зібрано</div>
    <div class="new-record" id="newRecordBadge">🏆 НОВИЙ РЕКОРД!</div>
    <p style="margin-top:4px">Рекорд: <span id="goRecord" style="color:var(--gold)">0</span></p>
    <table class="top-list" id="topList"></table>
    <button class="btn danger" style="margin-top:6px" onclick="startGame()">ЩЕ РАЗ</button>
  </div>

</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────
const PLATFORM_W = 78;
const PLATFORM_H = 20;
const PLAYER_W   = 48;
const PLAYER_H   = 48;
const CHUNK_H    = 900;   // генеруємо платформи порціями
const BASELINE   = 100000; // велике число = "підлога" у CSS-просторі

// Швидкість ↓ зменшена
const GRAVITY  = 0.52;
const MOVE_SPD = 5.0;   // було 7.5
const JUMP_PWR = 14.0;  // було 15.5
const FRICTION = 0.80;

// ─── STATE ────────────────────────────────────────────────────────────────
let state='idle', score=0, frameId;
let record=parseInt(localStorage.getItem('swampRecord')||'0');
let sessionBest=[];
let px, py, pvx, pvy;
let moveDir=0;
let platforms=[], flowers=[];
let cameraOffset=0;   // translateY поточний (px)
let maxHeight=0;
let diffLevel=0;
let topGenY=0;        // найвища згенерована Y (world coords, зростає вгору)

// ─── DOM ──────────────────────────────────────────────────────────────────
const worldEl=document.getElementById('world');
const playerEl=document.getElementById('player');
const viewportEl=document.getElementById('viewport');
const scoreEl=document.getElementById('scoreVal');
const recordEl=document.getElementById('recordVal');
recordEl.textContent=record;

// ─── COORDINATE HELPERS ───────────────────────────────────────────────────
// World Y зростає вгору (фізика). CSS top = BASELINE - y - elementHeight.
function toCssTop(y, h){ return BASELINE - y - h; }

// ─── PLATFORM / FLOWER HELPERS ────────────────────────────────────────────
function makePlatform(x, y, moving){
  const el=document.createElement('div');
  el.className='platform'+(moving?' moving':'');
  el.style.cssText=`position:absolute;width:${PLATFORM_W}px;height:${PLATFORM_H}px;left:${x}px;top:${toCssTop(y,PLATFORM_H)}px;`;
  worldEl.appendChild(el);
  return { x,y,w:PLATFORM_W,h:PLATFORM_H,el,moving,
           dir:moving?(Math.random()<.5?1:-1):0,
           speed:0.55+Math.random()*0.85,
           range:40+Math.random()*50,
           originX:x };
}

function syncPlatformPos(p){
  p.el.style.left=p.x+'px';
  p.el.style.top=toCssTop(p.y,p.h)+'px';
}

function makeFlower(p){
  const fx=p.x+PLATFORM_W/2-11, fy=p.y+PLATFORM_H+2;
  const fe=document.createElement('div'); fe.className='flower';
  const emojis=['🌸','🌺','🌼','🌻','🌷'];
  fe.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  fe.style.cssText=`position:absolute;font-size:20px;line-height:1;text-shadow:0 0 6px #fff8;animation:floatFlower 3s ease-in-out infinite;left:${fx}px;top:${toCssTop(fy,22)}px;`;
  worldEl.appendChild(fe);
  return {x:fx,y:fy,taken:false,el:fe};
}

// ─── INFINITE GENERATION ──────────────────────────────────────────────────
function generateUpTo(targetY){
  const viewW=viewportEl.offsetWidth||380;
  while(topGenY<targetY){
    const gap=88+Math.random()*55-Math.min(diffLevel*2,22);
    topGenY+=gap;
    diffLevel=Math.floor(topGenY/600);
    const margin=12;
    const x=margin+Math.random()*(viewW-PLATFORM_W-margin*2);
    const moving=diffLevel>=2&&Math.random()<Math.min(0.08+diffLevel*0.07,0.45);
    const p=makePlatform(x,topGenY,moving);
    platforms.push(p);
    if(Math.random()>0.35) flowers.push(makeFlower(p));
    // висотна мітка
    if(Math.floor(topGenY/500)>Math.floor((topGenY-gap)/500)){
      const hv=Math.floor(topGenY/500)*500;
      const el=document.createElement('div'); el.className='height-marker';
      el.textContent=`↑ ${hv}`; el.style.top=toCssTop(hv,14)+'px';
      worldEl.appendChild(el);
    }
  }
}

function cullBelow(minY){
  platforms=platforms.filter(p=>{ if(p.y+p.h<minY){p.el.remove();return false;} return true; });
  flowers=flowers.filter(f=>{ if(!f.taken&&f.y<minY){f.el.remove();return false;} return true; });
}

// ─── BUILD WORLD ─────────────────────────────────────────────────────────
function buildWorld(){
  Array.from(worldEl.children).forEach(c=>{ if(c.id!=='player') c.remove(); });
  platforms=[]; flowers=[];
  topGenY=0; cameraOffset=0; diffLevel=0; maxHeight=0; pvx=0; pvy=0;

  worldEl.style.cssText=`position:absolute;top:0;left:0;width:100%;height:${BASELINE+2000}px;will-change:transform;`;
  worldEl.style.transform='translateY(0)';

  // декор
  const viewW=viewportEl.offsetWidth||380;
  for(let i=0;i<2;i++){
    const el=document.createElement('div'); el.className='liana';
    const sx=i===0?-6:viewW-32;
    const H=BASELINE+2000;
    // SVG-тайл висотою 440px, повторюємо через background
    const TILE=440;
    el.style.cssText=`left:${sx}px;top:0;width:38px;height:${H}px;animation:sway ${5.5+i*1.5}s ease-in-out infinite alternate;`;
    // Будуємо тайл-SVG
    let parts=`<svg viewBox="0 0 38 ${TILE}" xmlns="http://www.w3.org/2000/svg" width="38" height="${TILE}">`;
    parts+=`<path d="M19 0 Q27 110 19 220 Q11 330 19 440" stroke="#2a5e30" stroke-width="3.5" fill="none"/>`;
    parts+=`<path d="M19 0 Q26 110 19 220 Q12 330 19 440" stroke="#3d8a42" stroke-width="1.5" fill="none" opacity=".45"/>`;
    const leafPositions=[[80,1],[190,-1],[300,1],[400,-1]];
    for(const [ly,side] of leafPositions){
      const lx=19+side*4, ex=19+side*22, ey=ly-20;
      parts+=`<path d="M${lx} ${ly} Q${ex} ${ey} ${lx+side*5} ${ly-32}" stroke="#2d7035" stroke-width="1.5" fill="#255c2b" fill-opacity=".75"/>`;
      parts+=`<path d="M${lx} ${ly} Q${ex-side*4} ${ey+4} ${lx+side*3} ${ly-28}" stroke="#3d9042" stroke-width=".7" fill="none" opacity=".5"/>`;
    }
    parts+=`</svg>`;
    // Кодуємо SVG у data URL і повторюємо через background-image
    const encoded='data:image/svg+xml;utf8,'+encodeURIComponent(parts);
    el.style.backgroundImage=`url("${encoded}")`;
    el.style.backgroundRepeat='repeat-y';
    el.style.backgroundSize=`38px ${TILE}px`;
    worldEl.appendChild(el);
  }
  for(let i=0;i<12;i++){
    const b=document.createElement('div'); b.className='bubble';
    const sz=4+Math.random()*8;
    b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*96}%;top:${BASELINE-Math.random()*300}px;animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*6}s;`;
    worldEl.appendChild(b);
  }

  // перша платформа
  const fp=makePlatform(viewW/2-PLATFORM_W/2, 60, false);
  platforms.push(fp); topGenY=60;

  // генеруємо перші 3 чанки
  generateUpTo(CHUNK_H*3);

  px=fp.x+PLATFORM_W/2-PLAYER_W/2;
  py=fp.y+PLATFORM_H;
  score=0; scoreEl.textContent=0;
  playerEl.style.display='block';
}

// ─── CONTROLS ────────────────────────────────────────────────────────────
function startMove(dir){ moveDir=dir; }
function stopMove()    { moveDir=0; }
document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft')startMove(-1); if(e.key==='ArrowRight')startMove(1); });
document.addEventListener('keyup',e=>{ if(e.key==='ArrowLeft'||e.key==='ArrowRight')stopMove(); });

// ─── GAME ─────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOverScreen').style.display='none';
  buildWorld(); state='play';
  if(frameId) cancelAnimationFrame(frameId);
  loop();
}

function triggerDead(){
  state='dead';
  playerEl.classList.add('flash');
  sessionBest.push(score); sessionBest.sort((a,b)=>b-a);
  if(sessionBest.length>5) sessionBest.length=5;
  if(score>record){ record=score; localStorage.setItem('swampRecord',record); recordEl.textContent=record; }
  document.getElementById('goScore').textContent=score;
  document.getElementById('goRecord').textContent=record;
  document.getElementById('newRecordBadge').style.display=(score>=record&&score>0)?'block':'none';
  const tbl=document.getElementById('topList'); tbl.innerHTML='';
  sessionBest.forEach((s,i)=>{ const r=tbl.insertRow(); r.insertCell().textContent=['🥇','🥈','🥉','4️⃣','5️⃣'][i]; r.insertCell().textContent=s+' квіток'; });
  document.getElementById('gameOverScreen').style.display='flex';
}

function loop(){
  if(state!=='play') return;
  frameId=requestAnimationFrame(loop);
  const viewW=viewportEl.offsetWidth||380;
  const vpH=viewportEl.offsetHeight;

  // рух — плавне прискорення
  if(moveDir!==0){ pvx+=moveDir*0.85; pvx=Math.max(-MOVE_SPD,Math.min(MOVE_SPD,pvx)); }
  else { pvx*=FRICTION; }

  px+=pvx;
  if(px<-PLAYER_W) px=viewW;
  if(px>viewW)     px=-PLAYER_W;

  pvy-=GRAVITY;
  py+=pvy;

  // платформи
  platforms.forEach(p=>{
    if(p.moving){ p.x+=p.dir*p.speed; if(Math.abs(p.x-p.originX)>p.range) p.dir*=-1; syncPlatformPos(p); }
    if(pvy<=0&&px+PLAYER_W>p.x+8&&px<p.x+p.w-8&&py>=p.y&&py<=p.y+p.h+Math.abs(pvy)+4){
      py=p.y+p.h; pvy=JUMP_PWR;
    }
  });

  if(py>maxHeight) maxHeight=py;

  // квіти
  flowers.forEach(f=>{
    if(!f.taken&&px+PLAYER_W>f.x&&px<f.x+24&&py+PLAYER_H>f.y&&py<f.y+24){
      f.taken=true; f.el.remove(); score++; scoreEl.textContent=score;
      scoreEl.style.transform='scale(1.3)'; setTimeout(()=>scoreEl.style.transform='',150);
    }
  });

  // смерть
  if(py<maxHeight-520||py<-150){ triggerDead(); return; }

  // нескінченна генерація: завжди маємо 3 чанки попереду гравця
  generateUpTo(py+CHUNK_H*3);

  // прибираємо старе далеко внизу
  cullBelow(py-CHUNK_H*2);

  // flip
  const img=document.getElementById('playerImg');
  if(pvx>0.5) img.style.transform='scaleX(1)';
  else if(pvx<-0.5) img.style.transform='scaleX(-1)';

  // камера: гравець тримається на 45% від верху viewport
  const playerCssTop=toCssTop(py,PLAYER_H);
  const targetOffset=-(playerCssTop-vpH*0.45);
  cameraOffset+=(targetOffset-cameraOffset)*0.1;

  worldEl.style.transform=`translateY(${cameraOffset}px)`;
  playerEl.style.left=px+'px';
  playerEl.style.top=playerCssTop+'px';
}
</script>
</body>
</html>
